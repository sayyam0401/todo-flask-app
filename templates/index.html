<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }

        .task-count {
            text-align: center;
            color: gray;
            font-size: 14px;
            margin-bottom: 15px;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f1f1f1;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        li:hover {
            transform: scale(1.02);
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .delete-btn {
            text-decoration: none;
            color: red;
            font-size: 18px;
        }

        .delete-btn:hover {
            color: darkred;
        }

        .empty {
            text-align: center;
            color: gray;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📝 My To-Do List</h1>

    <div class="task-count">
        Total Tasks: {{ tasks|length }}
    </div>

    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Enter task..." required>
        <button>Add</button>
    </form>

    {% if tasks %}
    <ul>
        {% for task in tasks %}
        <li>
            <div class="task-left">
                <input type="checkbox">
                <span>{{ task[1] }}</span>
            </div>

            <a class="delete-btn" href="/delete/{{ task[0] }}">❌</a>
        </li>
        {% endfor %}
    </ul>
    {% else %}
        <div class="empty">No tasks yet 🚀</div>
    {% endif %}

</div>

</body>
</html>
