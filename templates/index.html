<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASKS — Get it done</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #c8f135;
    --accent2: #ff6b35;
    --accent3: #7b61ff;
    --text: #f0f0f0;
    --muted: #666;
    --done: #3a3a3a;
    --red: #ff4757;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* Glow blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent3); bottom: -100px; left: -100px; }

  .app {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 120px;
  }

  /* Header */
  .header {
    margin-bottom: 48px;
    animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .logo {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(42px, 8vw, 64px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
  }

  h1 span {
    color: var(--accent);
    display: inline-block;
    animation: pulse-text 3s ease-in-out infinite;
  }

  @keyframes pulse-text {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .date-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 100px;
    margin-top: 6px;
    white-space: nowrap;
  }

  .stats-row {
    display: flex;
    gap: 16px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .stat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .stat-dot.all { background: var(--text); }
  .stat-dot.done { background: var(--accent); }
  .stat-dot.pending { background: var(--accent2); }

  .stat strong {
    color: var(--text);
    font-weight: 400;
  }

  /* Progress bar */
  .progress-wrap {
    margin-top: 20px;
    height: 3px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
    width: 0%;
  }

  /* Input zone */
  .input-zone {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 4px 4px 4px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s both;
  }

  .input-zone:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200, 241, 53, 0.1);
  }

  .input-zone input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    color: var(--text);
    padding: 14px 0;
  }

  .input-zone input::placeholder { color: var(--muted); }

  .priority-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  .priority-select:focus { border-color: var(--accent); }
  .priority-select option { background: var(--surface); }

  .add-btn {
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 12px 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
    letter-spacing: 0.02em;
  }

  .add-btn:hover { background: #d4f755; transform: scale(1.04); box-shadow: 0 0 20px rgba(200,241,53,0.3); }
  .add-btn:active { transform: scale(0.97); }

  /* Filter tabs */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.15s both;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .filter-btn:hover { border-color: var(--text); color: var(--text); }

  .filter-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
    font-weight: 600;
  }

  .filter-btn[data-filter="completed"].active { background: var(--accent); color: #0d0d0d; border-color: var(--accent); }
  .filter-btn[data-filter="pending"].active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  /* Sort control */
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 5px 12px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Task item */
  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation: taskIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes taskIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes taskOut {
    from { opacity: 1; transform: scale(1); max-height: 100px; }
    to { opacity: 0; transform: scale(0.95) translateX(20px); max-height: 0; margin-bottom: 0; padding: 0; border-width: 0; }
  }

  .task-item:hover {
    border-color: #3a3a3a;
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .task-item.done {
    opacity: 0.55;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* Priority accent line */
  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 14px 0 0 14px;
  }

  .task-item[data-priority="high"]::before { background: var(--red); }
  .task-item[data-priority="medium"]::before { background: var(--accent2); }
  .task-item[data-priority="low"]::before { background: var(--accent3); }
  .task-item[data-priority="none"]::before { background: var(--border); }

  /* Checkbox */
  .check-wrap {
    flex-shrink: 0;
    margin-top: 2px;
  }

  .check-wrap input[type="checkbox"] { display: none; }

  .check-box {
    width: 22px;
    height: 22px;
    border-radius: 7px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .check-box:hover { border-color: var(--accent); background: rgba(200,241,53,0.08); }

  .task-item.done .check-box {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-icon {
    opacity: 0;
    transform: scale(0);
    transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
  }

  .task-item.done .check-icon {
    opacity: 1;
    transform: scale(1);
  }

  .check-icon svg { width: 13px; height: 13px; }

  /* Task body */
  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    word-break: break-word;
    transition: color 0.3s;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .task-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .priority-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 100px;
    font-weight: 500;
  }

  .priority-badge.high { background: rgba(255,71,87,0.15); color: var(--red); }
  .priority-badge.medium { background: rgba(255,107,53,0.15); color: var(--accent2); }
  .priority-badge.low { background: rgba(123,97,255,0.15); color: var(--accent3); }
  .priority-badge.none { background: var(--surface2); color: var(--muted); }

  /* Task actions */
  .task-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .task-item:hover .task-actions { opacity: 1; }

  .action-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .action-btn:hover { border-color: var(--red); color: var(--red); background: rgba(255,71,87,0.1); }
  .action-btn svg { width: 13px; height: 13px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    animation: fadeIn 0.4s ease both;
  }

  .empty-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 16px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .empty-state p {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }

  .toast {
    background: var(--text);
    color: var(--bg);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 100px;
    white-space: nowrap;
    animation: toastIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(12px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes toastOut {
    from { opacity: 1; }
    to { opacity: 0; transform: translateY(8px); }
  }

  /* Animations */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="logo">✦ Task Manager</div>
    <div class="header-top">
      <h1>GET IT<br><span>DONE.</span></h1>
      <div class="date-chip" id="datechip">—</div>
    </div>
    <div class="stats-row">
      <div class="stat"><span class="stat-dot all"></span><strong id="stat-total">0</strong>&nbsp;total</div>
      <div class="stat"><span class="stat-dot done"></span><strong id="stat-done">0</strong>&nbsp;done</div>
      <div class="stat"><span class="stat-dot pending"></span><strong id="stat-pending">0</strong>&nbsp;pending</div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  </header>

  <!-- Input zone -->
  <div class="input-zone">
    <input type="text" id="task-input" placeholder="What needs to be done?" maxlength="120" autocomplete="off"/>
    <select class="priority-select" id="priority-select">
      <option value="none">— priority</option>
      <option value="high">🔴 High</option>
      <option value="medium">🟠 Medium</option>
      <option value="low">🟣 Low</option>
    </select>
    <button class="add-btn" id="add-btn">+ Add</button>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-filter="high">🔴 High</button>
    <button class="filter-btn" data-filter="medium">🟠 Medium</button>
    <button class="filter-btn" data-filter="low">🟣 Low</button>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <span class="section-label" id="list-label">All tasks</span>
    <button class="clear-btn" id="clear-btn">Clear completed</button>
  </div>

  <!-- Task list -->
  <div class="task-list" id="task-list"></div>

</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks_v2') || '[]');
  let filter = 'all';

  // Date
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  document.getElementById('datechip').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

  function save() { localStorage.setItem('tasks_v2', JSON.stringify(tasks)); }

  function showToast(msg) {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => {
      t.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => t.remove(), 300);
    }, 2200);
  }

  function formatTime(ts) {
    const d = new Date(ts);
    let h = d.getHours(), m = d.getMinutes();
    const ap = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    return `${h}:${String(m).padStart(2,'0')} ${ap}`;
  }

  function updateStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-pending').textContent = total - done;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function getFiltered() {
    switch(filter) {
      case 'pending': return tasks.filter(t => !t.done);
      case 'completed': return tasks.filter(t => t.done);
      case 'high': return tasks.filter(t => t.priority === 'high');
      case 'medium': return tasks.filter(t => t.priority === 'medium');
      case 'low': return tasks.filter(t => t.priority === 'low');
      default: return tasks;
    }
  }

  function render() {
    updateStats();
    const list = document.getElementById('task-list');
    const filtered = getFiltered();

    // Label
    const labels = { all: 'All tasks', pending: 'Pending', completed: 'Completed', high: 'High priority', medium: 'Medium priority', low: 'Low priority' };
    document.getElementById('list-label').textContent = `${labels[filter]} · ${filtered.length}`;

    if (filtered.length === 0) {
      const msgs = {
        all: ['📭', 'No tasks yet. Add one above!'],
        pending: ['✅', 'Nothing pending!'],
        completed: ['🌱', 'Nothing completed yet.'],
        high: ['🔴', 'No high priority tasks.'],
        medium: ['🟠', 'No medium priority tasks.'],
        low: ['🟣', 'No low priority tasks.'],
      };
      const [icon, msg] = msgs[filter];
      list.innerHTML = `<div class="empty-state"><span class="empty-icon">${icon}</span><p>${msg}</p></div>`;
      return;
    }

    list.innerHTML = '';
    filtered.forEach((task, i) => {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' done' : '');
      item.dataset.id = task.id;
      item.dataset.priority = task.priority;
      item.style.animationDelay = (i * 0.04) + 's';

      const badgeClass = task.priority !== 'none' ? task.priority : 'none';

      item.innerHTML = `
        <div class="check-wrap">
          <div class="check-box" title="Toggle done">
            <span class="check-icon">
              <svg viewBox="0 0 13 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 5L4.5 8.5L12 1" stroke="#0d0d0d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </div>
        </div>
        <div class="task-body">
          <div class="task-text">${escapeHtml(task.text)}</div>
          <div class="task-meta">
            <span class="task-time">${formatTime(task.created)}</span>
            ${task.priority !== 'none' ? `<span class="priority-badge ${badgeClass}">${task.priority}</span>` : ''}
          </div>
        </div>
        <div class="task-actions">
          <button class="action-btn delete-btn" title="Delete">
            <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 3h12M5 3V2h4v1M2 3l1 9h8l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      `;

      // Toggle done
      item.querySelector('.check-box').addEventListener('click', () => {
        const t = tasks.find(x => x.id === task.id);
        t.done = !t.done;
        save(); render();
        showToast(t.done ? '✅ Task completed!' : '↩ Marked as pending');
      });

      // Delete
      item.querySelector('.delete-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        item.style.animation = 'taskOut 0.3s ease forwards';
        setTimeout(() => {
          tasks = tasks.filter(x => x.id !== task.id);
          save(); render();
          showToast('🗑 Task deleted');
        }, 280);
      });

      list.appendChild(item);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const priority = document.getElementById('priority-select').value;
    const text = input.value.trim();
    if (!text) {
      input.style.outline = '2px solid var(--red)';
      setTimeout(() => input.style.outline = '', 800);
      return;
    }
    const task = { id: Date.now(), text, priority, done: false, created: Date.now() };
    tasks.unshift(task);
    save(); render();
    input.value = '';
    document.getElementById('priority-select').value = 'none';
    showToast('✦ Task added!');
    input.focus();
  }

  // Add button
  document.getElementById('add-btn').addEventListener('click', addTask);

  // Enter key
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  // Clear completed
  document.getElementById('clear-btn').addEventListener('click', () => {
    const count = tasks.filter(t => t.done).length;
    if (count === 0) { showToast('Nothing to clear!'); return; }
    tasks = tasks.filter(t => !t.done);
    save(); render();
    showToast(`🧹 Cleared ${count} completed task${count > 1 ? 's' : ''}`);
  });

  // Init
  render();
</script>
</body>
</html>
